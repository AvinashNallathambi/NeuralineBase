# ═══════════════════════════════════════════════════════════════════════════
# Neuraline EMR — Nginx Configuration for EC2 (Phase 1: No Docker)
#
# This config replaces the frontend Docker container's nginx.conf.
# It serves the frontend static files directly from /var/www/neuraline
# and proxies /api/ requests to the NestJS backend running on port 4000.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/neuraline
#   sudo ln -sf /etc/nginx/sites-available/neuraline /etc/nginx/sites-enabled/neuraline
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (run after DNS is configured):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;  # Certbot will update this to your domain after SSL setup

    root /var/www/neuraline;
    index index.html;

    # ── Security Headers (HIPAA) ───────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # HIPAA: Content Security Policy – restrict resource origins
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; media-src 'self' blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HIPAA: Prevent caching of HTML (may contain PHI in SPA state)
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;

    # ── Gzip Compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── API Proxy to NestJS Backend ────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large audio uploads for transcription (AssemblyAI)
        client_max_body_size 50m;

        # LLM inference can take time; be generous with timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # HIPAA: No caching for SPA shell (it renders PHI)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Cache Static Assets ────────────────────────────────────────────────
    # These are hashed build artifacts (no PHI) – safe to cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Disable access to hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Health check endpoint ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
