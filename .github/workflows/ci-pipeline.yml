name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: Lint + Typecheck (runs in parallel for frontend and backend)
  # ─────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (all workspaces)
        run: npm run lint

      - name: Typecheck backend
        run: npx tsc --noEmit --project backend/tsconfig.json

      - name: Typecheck frontend
        run: npx tsc --noEmit --project frontend/tsconfig.app.json

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: Unit Tests
  # ─────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test:backend

      - name: Run frontend unit tests
        run: npm run test:frontend

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: E2E Tests (backend only — needs test DB)
  # ─────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: neuraline
          POSTGRES_PASSWORD: neuraline_dev
          POSTGRES_DB: neuraline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: neuraline
      DB_PASSWORD: neuraline_dev
      DB_DATABASE: neuraline_test
      DB_SYNCHRONIZE: "true"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      JWT_SECRET: test-jwt-secret
      STEDI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend E2E tests
        run: cd backend && npx jest --config ./test/jest-e2e.json --forceExit

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: Build (verify both apps compile)
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend Docker image
        run: docker build -t neuraline-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t neuraline-frontend:ci ./frontend

  # ─────────────────────────────────────────────────────────────────────
  # Stage 5: Security Audit
  # ─────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────
  # Stage 6: All checks passed (gate for manual deploy)
  # ─────────────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, e2e-tests, build, security-audit]
    steps:
      - name: Pipeline succeeded
        run: |
          echo "✅ All CI checks passed."
          echo "The code is ready for manual deployment."
          echo ""
          echo "To deploy:"
          echo "  docker compose up --build -d"
