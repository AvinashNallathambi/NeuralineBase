name: Build and Refresh Docker Image

on:
  push:
    branches: [ "main" ] # Automatically builds when you push changes to main
  workflow_dispatch: # Allows you to manually click a button in GitHub to build anytime

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx for faster, cached builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log into Docker Hub using your GitHub secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Automatically build and push the new image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Replace 'my-app' below with your actual Docker Hub repository name
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          # Keeps build times fast by caching layers inside GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max
