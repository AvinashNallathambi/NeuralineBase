name: Deploy to AWS

on:
  # Manual trigger only — click "Run workflow" button in GitHub Actions UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Cancel any in-progress deploy to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Gate 1: Verify CI passed on this commit
  # ─────────────────────────────────────────────────────────────────────────
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    outputs:
      ci_passed: ${{ steps.check.outputs.passed }}
    steps:
      - uses: actions/checkout@v4

      - name: Check CI status on this commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.checkSuites.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            // Look for the CI Pipeline check suite
            const ciSuite = data.check_suites.find(
              suite => suite.conclusion === 'success'
            );

            if (!ciSuite) {
              core.setFailed('❌ CI has not passed on this commit. Push fixes and wait for CI to pass before deploying.');
              core.setOutput('passed', 'false');
              return;
            }

            console.log('✅ CI passed on commit:', context.sha);
            core.setOutput('passed', 'true');

  # ─────────────────────────────────────────────────────────────────────────
  # Gate 2: Deploy to EC2 via SSH
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: verify-ci
    if: needs.verify-ci.outputs.ci_passed == 'true'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "=== Neuraline EMR Deploy ==="
            echo "Commit: ${{ github.sha }}"
            echo "Environment: ${{ github.event.inputs.environment }}"
            echo "Triggered by: ${{ github.actor }}"
            echo ""

            cd /opt/neuraline

            # Make deploy script executable
            chmod +x deploy/deploy.sh

            # Run the deploy script
            ./deploy/deploy.sh

            # Final verification
            echo ""
            echo "=== Post-Deploy Verification ==="
            echo "Backend process:"
            pm2 status

            echo ""
            echo "Nginx status:"
            sudo systemctl is-active nginx && echo "Nginx: ACTIVE" || echo "Nginx: FAILED"

            echo ""
            echo "Health check (localhost):"
            curl -sf http://localhost:4000/ && echo "" || echo "⚠️ Backend health check failed"

            echo ""
            echo "✅ Deploy complete: ${{ github.sha }}"
